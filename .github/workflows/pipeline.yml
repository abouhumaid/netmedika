# .github/workflows/pipeline.yml
#
# Pipeline order: test ──► build ──► deploy
#
# Secrets required (GitHub → Settings → Secrets and variables → Actions):
#   EC2_SSH_KEY   — contents of your .pem private key
#   EC2_HOST      — public IP or domain of your EC2 instance
#   DATABASE_URL  — full postgres connection string for production

name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 — TEST
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: api
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest --tb=short -v


  # ---------------------------------------------------------------------------
  # JOB 2 — BUILD
  # Builds the Docker image and saves it as a .tar artifact for the deploy job.
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build \
            -t netmedika-app:${SHORT_SHA} \
            -t netmedika-app:latest \
            ./api

      - name: Save Docker image to tar
        run: docker save netmedika-app:latest -o netmedika-app.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: netmedika-app.tar
          retention-days: 1


  # ---------------------------------------------------------------------------
  # JOB 3 — DEPLOY
  #
  # FIX: Instead of passing variables inline through a heredoc (which breaks
  # when DATABASE_URL contains special characters like @, :, /), we:
  #   1. Write the deploy script to a temp file on the runner
  #   2. SCP both the image tar and the script to EC2
  #   3. Execute the script on EC2, passing DATABASE_URL as a safe env variable
  #
  # This completely avoids shell quoting issues with heredocs over SSH.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 400 ~/.ssh/key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Write the deploy script to a file on the runner.
      # Using << 'SCRIPT' (quoted) means NO variable substitution happens here —
      # DATABASE_URL is left as a literal $DATABASE_URL placeholder,
      # which will be filled in at runtime on EC2 from the environment.
      - name: Write deploy script
        run: |
          cat > /tmp/deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e    # Exit immediately if any command fails

          echo "📦 Loading Docker image..."
          docker load -i /home/ubuntu/netmedika-app.tar

          echo "🗄 Running database migrations..."
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            netmedika-app:latest \
            alembic upgrade head

          echo "🛑 Stopping old container..."
          docker stop netmedika 2>/dev/null || true
          docker rm   netmedika 2>/dev/null || true

          echo "🚀 Starting new container..."
          docker run -d \
            --name netmedika \
            --restart unless-stopped \
            -p 8000:8000 \
            -e DATABASE_URL="$DATABASE_URL" \
            netmedika-app:latest

          echo "🧹 Cleaning up..."
          rm -f /home/ubuntu/netmedika-app.tar
          rm -f /home/ubuntu/deploy.sh
          docker image prune -f

          echo "✅ Deployment complete:"
          docker ps --filter "name=netmedika"
          SCRIPT

          chmod +x /tmp/deploy.sh

      # SCP both files in one step to save time
      - name: Copy image and script to EC2
        run: |
          scp -i ~/.ssh/key.pem \
            netmedika-app.tar \
            /tmp/deploy.sh \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/

      # Execute the script on EC2.
      # DATABASE_URL is passed as an environment variable to the ssh command —
      # this is the safe way to pass secrets that contain special characters.
      - name: Run deploy script on EC2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}   # loaded into runner env first
        run: |
          ssh -i ~/.ssh/key.pem ubuntu@${{ secrets.EC2_HOST }} \
            "DATABASE_URL='${DATABASE_URL}' bash /home/ubuntu/deploy.sh"

      - name: Clean up SSH key
        if: always()    # Runs even if deploy failed
        run: rm -f ~/.ssh/key.pem