name: Deploy FastAPI

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/pipeline.yml"
      - "scripts/deploy_api.sh"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/netmedika-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build_and_push:
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build application image
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Push image
        run: docker push "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Add latest tag
        run: |
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"

  migrate:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull application image
        run: docker pull "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Run Alembic migrations against RDS
        run: >
          docker run --rm
          -e DATABASE_URL="${{ secrets.DATABASE_URL }}"
          "${IMAGE_NAME}:${IMAGE_TAG}"
          alembic upgrade head

  deploy:
    runs-on: ubuntu-latest
    needs: migrate

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy deploy script to EC2
        run: |
          scp -o StrictHostKeyChecking=no ../scripts/deploy_api.sh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy_api.sh"

      - name: Create deploy environment file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          {
            printf 'DATABASE_URL=%q\n' "$DATABASE_URL"
            printf 'SECRET_KEY=%q\n' "$SECRET_KEY"
            printf 'ACCESS_TOKEN_EXPIRE_MINUTES=%q\n' "$ACCESS_TOKEN_EXPIRE_MINUTES"
            printf 'REFRESH_TOKEN_EXPIRE_DAYS=%q\n' "$REFRESH_TOKEN_EXPIRE_DAYS"
            printf 'DOCKERHUB_USERNAME=%q\n' "$DOCKERHUB_USERNAME"
            printf 'DOCKERHUB_TOKEN=%q\n' "$DOCKERHUB_TOKEN"
          } > /tmp/netmedika-deploy.env

      - name: Copy deploy environment file to EC2
        run: |
          scp -o StrictHostKeyChecking=no /tmp/netmedika-deploy.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/netmedika-deploy.env"

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod +x /tmp/deploy_api.sh && \
            set -a && . /tmp/netmedika-deploy.env && set +a && \
            /tmp/deploy_api.sh '${IMAGE_NAME}:${IMAGE_TAG}'"
