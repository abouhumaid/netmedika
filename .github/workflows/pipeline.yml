name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # 1. TEST STAGE
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          cd api
          pytest

  # 2. BUILD STAGE (Creating the Artifact)
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          # We use lowercase for the image name to avoid registry errors
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/netmedika-app:latest
          docker build -t $IMAGE_ID ./api
          docker push $IMAGE_ID

  # 3. DEPLOY STAGE (Executing on EC2)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL # Passes the secret to the script safely
        script: |
          # Define image name
          IMAGE="ghcr.io/${{ github.repository_owner }}/netmedika-app:latest"
          
          echo "🔑 Logging into Registry on EC2..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "📥 Pulling latest image..."
          docker pull $IMAGE

          echo "🛑 Stopping old container..."
          docker stop netmedika || true
          docker rm netmedika || true

          echo "🗄 Running migrations..."
          docker run --rm -e DATABASE_URL="${{ secrets.DATABASE_URL }}" $IMAGE alembic upgrade head

          echo "🚀 Launching new container..."
          docker run -d \
            --name netmedika \
            -p 8000:8000 \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --restart unless-stopped \
            $IMAGE
          
          echo "🧹 Pruning old images to save disk space..."
          docker image prune -f
          
          echo "✅ Deployment Successful!"