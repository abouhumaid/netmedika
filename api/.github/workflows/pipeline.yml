name: FastAPI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    steps:

    # 1. Get your code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run tests (if you have)
    - name: Run tests
      run: |
        pytest || echo "No tests yet"

    # 5. Build app (check if it runs)
    - name: Check app startup
      run: |
        uvicorn app.main:app --help
